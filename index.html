<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>オンライン診療 枠モニタ</title>
<link rel="icon" href="data:,">
<style>
:root {
  --bg: #f5f6f8;
  --fg: #1d1d1f;
  --muted: #6b6f76;
  --card: #ffffff;
  --line: #e6e6ea;
  --open: #19a974;
  --booked: #f5a524;
  --closed: #c8c8cd;
  --c: #3b82f6;
  --s: #ec4899;
  --k: #8b5cf6;
  --g: #10b981;
  --n: #f97316;
  --h: #78716c;
  --gcal: #eab308;
}
@media (prefers-color-scheme: dark) {
  :root { --bg:#111214; --fg:#f5f5f5; --muted:#9ea3ab; --card:#1c1e22; --line:#2a2d33; --closed:#444; }
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
  margin: 0; background: var(--bg); color: var(--fg);
  -webkit-font-smoothing: antialiased;
}
header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--line);
  background: var(--card);
  position: sticky; top: 0; z-index: 10;
}
header h1 { margin: 0; font-size: 17px; }
header .updated { margin: 2px 0 0; font-size: 12px; color: var(--muted); }

.today-hero {
  padding: 16px;
  margin: 12px;
  background: var(--card);
  border-radius: 14px;
  border: 1px solid var(--line);
}
.today-hero h2 { margin: 0 0 4px; font-size: 14px; color: var(--muted); font-weight: 600; }
.hero-range {
  font-size: 28px; font-weight: 800; letter-spacing: -0.01em;
}
.hero-range.dim { color: var(--muted); font-size: 18px; font-weight: 600; }
.hero-stats { margin-top: 6px; font-size: 13px; color: var(--muted); }
.hero-stats b { color: var(--fg); font-weight: 700; }
.hero-next {
  margin-top: 8px; padding: 10px 12px; background: rgba(245,165,36,0.13);
  border-left: 4px solid var(--booked);
  border-radius: 8px; font-size: 14px; line-height: 1.45;
}
.hero-next .lbl { color: var(--muted); font-size: 12px; font-weight: 600; }
.hero-next .val { font-weight: 700; font-size: 15px; }
.hero-next .val .when { color: var(--booked); }

section { margin: 12px; }
section > h2 {
  margin: 0 0 8px; font-size: 13px; color: var(--muted); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em;
}

details.day {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; margin-bottom: 8px; overflow: hidden;
}
details.day > summary {
  padding: 12px 14px; cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  list-style: none;
}
details.day > summary::-webkit-details-marker { display: none; }
details.day[open] > summary { border-bottom: 1px solid var(--line); }

.day-date {
  font-weight: 700; min-width: 60px; font-size: 15px;
}
.day-date.today { color: var(--open); }
.day-range {
  font-size: 14px; flex: 1; color: var(--fg); font-weight: 600;
}
.day-range.empty { color: var(--muted); font-weight: 500; }
.day-badges { display: flex; gap: 6px; }
.badge {
  padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700;
  background: var(--line); color: var(--fg);
}
.badge.open { background: rgba(25,169,116,0.15); color: var(--open); }
.badge.booked { background: rgba(245,165,36,0.15); color: var(--booked); }

.slot-grid {
  padding: 6px 10px 12px;
}
.slot-row {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 8px; align-items: center;
  padding: 6px 6px; border-top: 1px solid var(--line);
  border-radius: 6px;
}
.slot-row:first-child { border-top: none; }
/* 行レベルで予約あり/空きのみを淡色帯で識別 */
.slot-row.has-booked {
  background: rgba(245,165,36,0.09);
}
.slot-row.open-only {
  background: rgba(25,169,116,0.04);
}
.slot-time { font-variant-numeric: tabular-nums; font-size: 14px; color: var(--fg); font-weight: 600; }
.slot-time.past { color: var(--muted); opacity: 0.55; }
.slot-platforms { display: flex; flex-wrap: wrap; gap: 5px; }

/* Pill 共通 */
.pill {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: 999px;
  font-size: 12px; line-height: 1.35;
  white-space: nowrap;
}
/* 空き枠 = アウトライン（薄め）— 「空き」が一目で分かる */
.pill.open {
  background: transparent;
  border: 1.5px solid currentColor;
  font-weight: 600;
  opacity: 0.85;
}
.pill.open.c { color: var(--c); }
.pill.open.s { color: var(--s); }
.pill.open.k { color: var(--k); }
.pill.open.g { color: var(--g); }

/* 予約済み枠 = ベタ塗り＋強調（はっきり目立つ） */
.pill.booked {
  color: #fff; font-weight: 800;
  border: 1.5px solid transparent;
  box-shadow: 0 1px 2px rgba(0,0,0,0.12);
}
.pill.booked.c { background: var(--c); }
.pill.booked.s { background: var(--s); }
.pill.booked.k { background: var(--k); }
.pill.booked.g { background: var(--g); }
.pill.booked.n { background: var(--n); }
.pill.booked.h { background: var(--h); }

/* 受診種別タグ（再診/初診など）を pill 内に同居 */
.pill .vt {
  margin-left: 5px; padding: 0 5px;
  background: rgba(255,255,255,0.28);
  border-radius: 4px; font-size: 10px; font-weight: 700;
  letter-spacing: 0.02em;
}

.pill.closed {
  background: var(--closed); color: #888; font-weight: 500;
  opacity: 0.7;
}

.long-table {
  width: 100%; border-collapse: collapse;
  background: var(--card); border-radius: 12px; overflow: hidden;
  border: 1px solid var(--line);
  font-size: 13px;
}
.long-table th, .long-table td {
  text-align: left; padding: 8px 10px; border-top: 1px solid var(--line);
}
.long-table th { background: transparent; color: var(--muted); font-weight: 600; font-size: 12px; border-top: none; }
.long-table td.num { font-variant-numeric: tabular-nums; text-align: right; }
.long-table .empty { color: var(--muted); }

.legend {
  margin: 12px; padding: 10px 12px; font-size: 12px; color: var(--muted);
  display: flex; flex-wrap: wrap; gap: 10px;
}
.legend .item { display: inline-flex; align-items: center; gap: 4px; }
.swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

footer {
  padding: 20px 16px 40px; text-align: center; color: var(--muted); font-size: 11px;
}
</style>
</head>

const PLATFORM_CSS = {C:"c", S:"s", "クロン":"k", GMO:"g", CLINICS:"c", SOKUYAKU:"s"};
const PLATFORM_SHORT = {CLINICS:"C", SOKUYAKU:"S", "クロン":"K", GMO:"G"};
const GCAL_CSS = {C:"c", S:"s", K:"k", G:"g", N:"n", H:"h"};

function fmtJst(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    const pad = n => String(n).padStart(2, "0");
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  } catch(e) { return iso; }
}

function renderHero() {
  const today = PAYLOAD.days[0];
  const hero = document.getElementById("hero");
  if (!today) { hero.innerHTML = "<h2>今日</h2><div class='hero-range dim'>データなし</div>"; return; }

  let range = "";
  if (today.range_text) {
    range = `<div class="hero-range">${today.range_text}</div>`;
  } else {
    range = `<div class="hero-range dim">本日は枠なし</div>`;
  }
  const total = today.open_count + today.booked_count;
  let stats = `<div class="hero-stats">予 <b>${today.booked_count}</b> ／ 全 <b>${total}</b>（空き <b>${today.open_count}</b>）</div>`;

  // 「次の診察」: 30日先まで探索した最早の予約あり枠
  let next = "";
  const na = PAYLOAD.next_appointment;
  if (na) {
    const todayStr = today.date;
    const whenLabel = (na.date === todayStr) ? `本日 ${na.time}` : `${na.short} ${na.time}`;
    const codeName = ({C:"CLINICS", S:"SOKUYAKU", K:"クロン", G:"GMO", N:"ドクターナウ", H:"HdD24"})[na.code] || na.code;
    let detail = na.code;
    if (na.visit_type) detail += `：${na.visit_type}`;
    if (na.department) detail += ` / ${na.department}`;
    next = `<div class="hero-next">
      <div class="lbl">次の診察</div>
      <div class="val"><span class="when">${whenLabel}</span> &nbsp;<span style="color:var(--muted);font-size:13px">${codeName}</span> &nbsp;${detail}</div>
    </div>`;
  } else {
    next = `<div class="hero-next" style="background:rgba(107,111,118,0.08);border-left-color:var(--muted)">
      <div class="lbl">次の診察</div>
      <div class="val" style="color:var(--muted);font-size:13px;font-weight:600">先30日に予約はありません</div>
    </div>`;
  }
  hero.innerHTML = `<h2>本日 ${today.short}</h2>${range}${stats}${next}`;
}

// 1セル分のpill群を生成（booked と同コードの gcal をマージして重複排除）
function buildPills(cell) {
  // 1) gcal を一旦コードで分類（C/S/K/G/N/H）
  const gcal = cell.gcal;
  const gcalCode = gcal ? (gcal.code || "") : "";
  const gcalVT = gcal ? (gcal.visit_type || "") : "";
  const gcalDept = gcal ? (gcal.department || "") : "";

  // 2) プラットフォーム → 表示順を CLINICS, SOKUYAKU, クロン, GMO で揃える
  const order = ["CLINICS", "SOKUYAKU", "クロン", "GMO"];
  const names = order.filter(n => cell.platforms[n] !== undefined);
  // 上記以外（万が一）も追加
  for (const n of Object.keys(cell.platforms)) {
    if (!names.includes(n)) names.push(n);
  }

  let html = "";
  let gcalConsumed = false;

  for (const name of names) {
    const info = cell.platforms[name];
    const short = PLATFORM_SHORT[name] || name;
    const css = PLATFORM_CSS[name] || "";
    const st = info.status;

    if (st === "closed") {
      html += `<span class="pill closed">${short}×</span>`;
      continue;
    }
    if (st === "open") {
      html += `<span class="pill open ${css}">${short}</span>`;
      continue;
    }
    if (st === "booked") {
      // 同コードの gcal があればここでマージ（visit_type を吸収）
      let vt = "";
      if (gcal && gcalCode === short && !gcalConsumed) {
        vt = gcalVT;
        if (gcalDept) vt = vt ? `${vt}/${gcalDept}` : gcalDept;
        gcalConsumed = true;
      }
      const vtTag = vt ? `<span class="vt">${vt}</span>` : "";
      html += `<span class="pill booked ${css}">${short}${vtTag}</span>`;
      continue;
    }
  }

  // gcal が残っている（プラットフォーム由来 booked と一致しなかった）場合は単独 pill
  if (gcal && !gcalConsumed) {
    const css = GCAL_CSS[gcalCode] || "h";
    let vt = gcalVT || "";
    if (gcalDept) vt = vt ? `${vt}/${gcalDept}` : gcalDept;
    const vtTag = vt ? `<span class="vt">${vt}</span>` : "";
    html += `<span class="pill booked ${css}">${gcalCode || "?"}${vtTag}</span>`;
  }
  return html;
}

function dayDetails(day, isToday) {
  let rows = "";
  const now = new Date();
  const pad = n => String(n).padStart(2, "0");
  const nowHHMM = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  for (const cell of day.slots) {
    const pills = buildPills(cell);
    const past = (isToday && cell.time < nowHHMM) ? " past" : "";
    // 行の背景: 予約あり / 空きのみ で識別
    const hasBooked = !!cell.gcal || Object.values(cell.platforms).some(p => p.status === "booked");
    const hasOpen = Object.values(cell.platforms).some(p => p.status === "open");
    let rowCls = "slot-row";
    if (hasBooked) rowCls += " has-booked";
    else if (hasOpen) rowCls += " open-only";
    rows += `<div class="${rowCls}"><div class="slot-time${past}">${cell.time}</div><div class="slot-platforms">${pills}</div></div>`;
  }
  return `<div class="slot-grid">${rows || "<div style='padding:10px;color:var(--muted)'>枠なし</div>"}</div>`;
}

function renderWeek() {
  const target = document.getElementById("week");
  const today = PAYLOAD.days[0] ? PAYLOAD.days[0].date : "";
  const html = PAYLOAD.days.slice(0, 7).map((day, i) => {
    const isToday = day.date === today && i === 0;
    const openCls = isToday ? "today" : "";
    const rangeText = day.range_text || "枠なし";
    const rangeCls = day.range_text ? "day-range" : "day-range empty";
    const total = day.open_count + day.booked_count;
    const attrOpen = i === 0 ? "open" : "";
    return `<details class="day" ${attrOpen}>
      <summary>
        <span class="day-date ${openCls}">${day.short}</span>
        <span class="${rangeCls}">${rangeText}</span>
        <span class="day-badges">
          <span class="badge booked">予${day.booked_count}</span>
          <span class="badge open">／全${total}</span>
        </span>
      </summary>
      ${dayDetails(day, isToday)}
    </details>`;
  }).join("");
  target.innerHTML = html;
}

function renderLong() {
  const target = document.getElementById("long");
  const days = PAYLOAD.days.slice(7);
  if (!days.length) { target.innerHTML = "<div class='empty' style='color:var(--muted);font-size:13px'>データがありません（日次長期ジョブを起動後に表示）</div>"; return; }
  let rows = "";
  for (const day of days) {
    const range = day.range_text || "—";
    const rangeCls = day.range_text ? "" : "empty";
    const total = day.open_count + day.booked_count;
    rows += `<tr>
      <td>${day.short}</td>
      <td class="${rangeCls}">${range}</td>
      <td class="num">${day.booked_count}／${total}</td>
    </tr>`;
  }
  target.innerHTML = `<table class="long-table">
    <thead><tr><th>日付</th><th>確保時間帯</th><th>予／全</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

document.getElementById("updated").textContent = "最終更新: " + fmtJst(PAYLOAD.generated);
renderHero();
renderWeek();
renderLong();
</script>
