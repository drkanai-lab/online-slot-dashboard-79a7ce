<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive">
<title>オンライン診療 枠モニタ</title>
<link rel="icon" href="data:,">
<style>
:root {
  --bg: #f5f6f8;
  --fg: #1d1d1f;
  --muted: #6b6f76;
  --card: #ffffff;
  --line: #e6e6ea;
  --open: #19a974;
  --booked: #f5a524;
  --closed: #c8c8cd;
  /* プラットフォーム色 (260418 改訂):
     CLINICS=ピンク, SOKUYAKU=青, クロン=緑, GMO=朱色 */
  --c: #ec4899;   /* CLINICS  ピンク */
  --s: #2563eb;   /* SOKUYAKU 青     */
  --k: #10b981;   /* クロン   緑     */
  --g: #ea580c;   /* GMO      朱色   */
  --n: #f97316;
  --h: #78716c;
  --gcal: #eab308;
}
@media (prefers-color-scheme: dark) {
  :root { --bg:#111214; --fg:#f5f5f5; --muted:#9ea3ab; --card:#1c1e22; --line:#2a2d33; --closed:#444; }
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
  margin: 0; background: var(--bg); color: var(--fg);
  -webkit-font-smoothing: antialiased;
}
header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--line);
  background: var(--card);
  position: sticky; top: 0; z-index: 10;
}
header h1 { margin: 0; font-size: 17px; }
header .updated { margin: 2px 0 0; font-size: 12px; color: var(--muted); }

.today-hero {
  padding: 16px;
  margin: 12px;
  background: var(--card);
  border-radius: 14px;
  border: 1px solid var(--line);
}
.today-hero h2 { margin: 0 0 4px; font-size: 14px; color: var(--muted); font-weight: 600; }
.hero-range {
  font-size: 28px; font-weight: 800; letter-spacing: -0.01em;
}
.hero-range.dim { color: var(--muted); font-size: 18px; font-weight: 600; }
.hero-stats { margin-top: 8px; font-size: 16px; color: var(--fg); font-weight: 600; }
.hero-stats b { color: var(--fg); font-weight: 800; font-size: 18px; }
.hero-stats .sep { color: var(--muted); margin: 0 4px; }
.hero-stats .booked-num { color: #b25c00; }
.hero-stats .total-num { color: var(--open); }
.hero-next {
  margin-top: 10px; padding: 12px 14px;
  background: linear-gradient(135deg, rgba(245,165,36,0.18), rgba(245,165,36,0.08));
  border-left: 4px solid var(--booked);
  border-radius: 10px; font-size: 15px; line-height: 1.5;
}
.hero-next .lbl { color: var(--booked); font-size: 12px; font-weight: 800; letter-spacing: 0.06em; }
.hero-next .val { font-weight: 700; font-size: 16px; margin-top: 4px; color: var(--fg); }
.hero-next .val .when {
  display: inline-block; padding: 2px 8px; margin-right: 6px;
  background: var(--booked); color: #fff; border-radius: 6px;
  font-weight: 800; font-size: 16px;
}
.hero-next .val .who { color: var(--fg); font-weight: 800; }
.hero-next .val .meta { color: var(--muted); font-weight: 600; font-size: 13px; margin-left: 4px; }
@media (prefers-color-scheme: dark) {
  .hero-stats .booked-num { color: #ffb648; }
}

section { margin: 12px; }
section > h2 {
  margin: 0 0 8px; font-size: 13px; color: var(--muted); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.05em;
}

details.day {
  background: var(--card); border: 1px solid var(--line);
  border-radius: 12px; margin-bottom: 8px; overflow: hidden;
}
details.day > summary {
  padding: 12px 14px; cursor: pointer;
  display: flex; align-items: center; gap: 10px;
  list-style: none;
}
details.day > summary::-webkit-details-marker { display: none; }
details.day[open] > summary { border-bottom: 1px solid var(--line); }

.day-date {
  font-weight: 700; min-width: 60px; font-size: 15px;
}
.day-date.today { color: var(--open); }
.day-range {
  font-size: 14px; flex: 1; color: var(--fg); font-weight: 600;
}
.day-range.empty { color: var(--muted); font-weight: 500; }
.day-badges { display: flex; gap: 6px; align-items: center; }
.badge {
  padding: 3px 10px; border-radius: 999px; font-size: 13px; font-weight: 800;
  background: var(--line); color: var(--fg);
  font-variant-numeric: tabular-nums;
}
.badge.booked {
  background: var(--booked); color: #fff;
}
.badge.open {
  background: var(--card); color: var(--fg);
  border: 1.5px solid var(--line);
}
.badge.open b { color: var(--open); font-weight: 900; }

.slot-grid {
  padding: 6px 10px 12px;
}
.slot-row {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 8px; align-items: center;
  padding: 6px 6px; border-top: 1px solid var(--line);
  border-radius: 6px;
}
.slot-row:first-child { border-top: none; }
/* 行レベルで予約あり/空きのみを淡色帯で識別 */
.slot-row.has-booked {
  background: rgba(245,165,36,0.09);
}
.slot-row.open-only {
  background: rgba(25,169,116,0.04);
}
.slot-time { font-variant-numeric: tabular-nums; font-size: 14px; color: var(--fg); font-weight: 600; }
.slot-time.past { color: var(--muted); opacity: 0.55; }
.slot-platforms { display: flex; flex-wrap: wrap; gap: 5px; }

/* Pill 共通 */
.pill {
  display: inline-flex; align-items: center;
  padding: 3px 9px; border-radius: 999px;
  font-size: 12px; line-height: 1.35;
  white-space: nowrap;
}
/* 空き枠 = アウトライン（薄め）— 「空き」が一目で分かる */
.pill.open {
  background: transparent;
  border: 1.5px solid currentColor;
  font-weight: 600;
  opacity: 0.85;
}
.pill.open.c { color: var(--c); }
.pill.open.s { color: var(--s); }
.pill.open.k { color: var(--k); }
.pill.open.g { color: var(--g); }

/* 予約済み枠 = ベタ塗り＋強調（はっきり目立つ） */
.pill.booked {
  color: #fff; font-weight: 800;
  border: 1.5px solid transparent;
  box-shadow: 0 1px 2px rgba(0,0,0,0.12);
}
.pill.booked.c { background: var(--c); }
.pill.booked.s { background: var(--s); }
.pill.booked.k { background: var(--k); }
.pill.booked.g { background: var(--g); }
.pill.booked.n { background: var(--n); }
.pill.booked.h { background: var(--h); }

/* 患者氏名タグ — pill に隣接して見やすく */
.pill .nm {
  margin-left: 6px; font-size: 13px; font-weight: 800;
  letter-spacing: 0.01em;
}
/* 受診種別タグ（再診/初診など）を pill 内に同居 */
.pill .vt {
  margin-left: 6px; padding: 1px 6px;
  background: rgba(255,255,255,0.32);
  border-radius: 5px; font-size: 12px; font-weight: 800;
  letter-spacing: 0.02em;
}
/* closed pill は不要要望により非表示 */
.pill.closed { display: none; }

.long-table {
  width: 100%; border-collapse: collapse;
  background: var(--card); border-radius: 12px; overflow: hidden;
  border: 1px solid var(--line);
  font-size: 13px;
}
.long-table th, .long-table td {
  text-align: left; padding: 8px 10px; border-top: 1px solid var(--line);
}
.long-table th { background: transparent; color: var(--muted); font-weight: 600; font-size: 12px; border-top: none; }
.long-table td.num { font-variant-numeric: tabular-nums; text-align: right; }
.long-table .empty { color: var(--muted); }

.legend {
  margin: 12px; padding: 10px 12px; font-size: 12px; color: var(--muted);
  display: flex; flex-wrap: wrap; gap: 10px;
}
.legend .item { display: inline-flex; align-items: center; gap: 4px; }
.swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }

footer {
  padding: 20px 16px 40px; text-align: center; color: var(--muted); font-size: 11px;
}
</style>
</head>

": {"クロン": 1, "CLINICS": 3, "SOKUYAKU": 2, "GMO": 1}, "per_platform_booked": {}, "ranges": [["22:00", "23:10"]], "range_text": "22:00〜23:10", "slots": [{"time": "22:00", "platforms": {"クロン": {"status": "open", "end_time": "22:10"}}, "gcals": []}, {"time": "22:10", "platforms": {"CLINICS": {"status": "open", "end_time": ""}}, "gcals": []}, {"time": "22:20", "platforms": {"CLINICS": {"status": "open", "end_time": ""}}, "gcals": []}, {"time": "22:30", "platforms": {"SOKUYAKU": {"status": "open", "end_time": "22:45"}}, "gcals": []}, {"time": "22:45", "platforms": {"SOKUYAKU": {"status": "open", "end_time": "23:00"}}, "gcals": []}, {"time": "22:50", "platforms": {"CLINICS": {"status": "open", "end_time": ""}}, "gcals": []}, {"time": "23:00", "platforms": {"GMO": {"status": "open", "end_time": "23:10"}}, "gcals": []}, {"time": "23:30", "platforms": {"クロン": {"status": "closed", "end_time": "23:40"}}, "gcals": []}], "last_updated": "2026-04-18T23:21:48.331161+09:00"}]};
const PLATFORM_CSS = {C:"c", S:"s", "クロン":"k", GMO:"g", CLINICS:"c", SOKUYAKU:"s"};
const PLATFORM_SHORT = {CLINICS:"C", SOKUYAKU:"S", "クロン":"K", GMO:"G"};
const GCAL_CSS = {C:"c", S:"s", K:"k", G:"g", N:"n", H:"h"};

function fmtJst(iso) {
  if (!iso) return "";
  try {
    const d = new Date(iso);
    const pad = n => String(n).padStart(2, "0");
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  } catch(e) { return iso; }
}

function renderHero() {
  const today = PAYLOAD.days[0];
  const hero = document.getElementById("hero");
  if (!today) { hero.innerHTML = "<h2>今日</h2><div class='hero-range dim'>データなし</div>"; return; }

  let range = "";
  if (today.range_text) {
    range = `<div class="hero-range">${today.range_text}</div>`;
  } else {
    range = `<div class="hero-range dim">本日は枠なし</div>`;
  }
  const total = today.open_count + today.booked_count;
  let stats = `<div class="hero-stats">予 <b class="booked-num">${today.booked_count}</b><span class="sep">／</span>全 <b class="total-num">${total}</b><span style="color:var(--muted);font-size:13px;margin-left:6px">（空き ${today.open_count}）</span></div>`;

  // 「次の診察」: 30日先まで探索した最早の予約あり枠
  let next = "";
  const na = PAYLOAD.next_appointment;
  if (na) {
    const todayStr = today.date;
    const whenLabel = (na.date === todayStr) ? `本日 ${na.time}` : `${na.short} ${na.time}`;
    const codeName = ({C:"CLINICS", S:"SOKUYAKU", K:"クロン", G:"GMO", N:"ドクターナウ", H:"HdD24"})[na.code] || na.code;
    const who = na.patient_name ? `<span class="who"> ${na.patient_name} 様</span>` : "";
    const metaBits = [];
    if (na.visit_type) metaBits.push(na.visit_type);
    if (na.department) metaBits.push(na.department);
    metaBits.push(codeName);
    const meta = `<span class="meta">（${metaBits.join(" / ")}）</span>`;
    next = `<div class="hero-next">
      <div class="lbl">次の診察</div>
      <div class="val"><span class="when">${whenLabel}</span>${who}${meta}</div>
    </div>`;
  } else {
    next = `<div class="hero-next" style="background:rgba(107,111,118,0.10);border-left-color:var(--muted)">
      <div class="lbl">次の診察</div>
      <div class="val" style="color:var(--muted);font-size:14px;font-weight:600">先30日に予約はありません</div>
    </div>`;
  }
  hero.innerHTML = `<h2>本日 ${today.short}</h2>${range}${stats}${next}`;
}

// 1セル分のpill群を生成（booked と同コードの gcal をマージして重複排除）
// gcals は list（同time に複数の予約あり: 例 23:30 に K喜多 と S小柳津）
function buildPills(cell) {
  // 旧形式 cell.gcal (単一 dict) も吸収して常に list 化
  let gcals = [];
  if (Array.isArray(cell.gcals)) gcals = cell.gcals.slice();
  else if (cell.gcal) gcals = [cell.gcal];

  // プラットフォーム → 表示順を CLINICS, SOKUYAKU, クロン, GMO で揃える
  const order = ["CLINICS", "SOKUYAKU", "クロン", "GMO"];
  const names = order.filter(n => cell.platforms[n] !== undefined);
  for (const n of Object.keys(cell.platforms)) {
    if (!names.includes(n)) names.push(n);
  }

  let html = "";
  const consumed = new Array(gcals.length).fill(false);

  for (const name of names) {
    const info = cell.platforms[name];
    const short = PLATFORM_SHORT[name] || name;
    const css = PLATFORM_CSS[name] || "";
    const st = info.status;

    if (st === "closed") continue;  // closed pill は非表示
    if (st === "open") {
      html += `<span class="pill open ${css}">${short}</span>`;
      continue;
    }
    if (st === "booked") {
      // 同コードで未消費の gcal を1件吸収
      let nm = "", vt = "";
      for (let i = 0; i < gcals.length; i++) {
        if (consumed[i]) continue;
        const g = gcals[i];
        if ((g.code || "") === short) {
          nm = g.patient_name || "";
          vt = g.visit_type || "";
          if (g.department) vt = vt ? `${vt}/${g.department}` : g.department;
          consumed[i] = true;
          break;
        }
      }
      const nmTag = nm ? `<span class="nm">${nm}</span>` : "";
      const vtTag = vt ? `<span class="vt">${vt}</span>` : "";
      html += `<span class="pill booked ${css}">${short}${nmTag}${vtTag}</span>`;
      continue;
    }
  }

  // 消費されなかった gcal は単独 pill として追加
  for (let i = 0; i < gcals.length; i++) {
    if (consumed[i]) continue;
    const g = gcals[i];
    const code = g.code || "";
    const css = GCAL_CSS[code] || "h";
    let vt = g.visit_type || "";
    if (g.department) vt = vt ? `${vt}/${g.department}` : g.department;
    const nmTag = g.patient_name ? `<span class="nm">${g.patient_name}</span>` : "";
    const vtTag = vt ? `<span class="vt">${vt}</span>` : "";
    html += `<span class="pill booked ${css}">${code || "?"}${nmTag}${vtTag}</span>`;
  }
  return html;
}

function dayDetails(day, isToday) {
  let rows = "";
  const now = new Date();
  const pad = n => String(n).padStart(2, "0");
  const nowHHMM = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  for (const cell of day.slots) {
    const pills = buildPills(cell);
    // 全 platform が closed のみで gcal もない場合 → 表示すべきpillが無いので行ごと省略
    if (!pills) continue;
    const past = (isToday && cell.time < nowHHMM) ? " past" : "";
    // 行の背景: 予約あり / 空きのみ で識別
    const hasGcal = (Array.isArray(cell.gcals) && cell.gcals.length > 0) || !!cell.gcal;
    const hasBooked = hasGcal || Object.values(cell.platforms).some(p => p.status === "booked");
    const hasOpen = Object.values(cell.platforms).some(p => p.status === "open");
    let rowCls = "slot-row";
    if (hasBooked) rowCls += " has-booked";
    else if (hasOpen) rowCls += " open-only";
    rows += `<div class="${rowCls}"><div class="slot-time${past}">${cell.time}</div><div class="slot-platforms">${pills}</div></div>`;
  }
  return `<div class="slot-grid">${rows || "<div style='padding:10px;color:var(--muted)'>枠なし</div>"}</div>`;
}

function renderWeek() {
  const target = document.getElementById("week");
  const today = PAYLOAD.days[0] ? PAYLOAD.days[0].date : "";
  const html = PAYLOAD.days.slice(0, 7).map((day, i) => {
    const isToday = day.date === today && i === 0;
    const openCls = isToday ? "today" : "";
    const rangeText = day.range_text || "枠なし";
    const rangeCls = day.range_text ? "day-range" : "day-range empty";
    const total = day.open_count + day.booked_count;
    // 本日 + 明日 を展開
    const attrOpen = i <= 1 ? "open" : "";
    return `<details class="day" ${attrOpen}>
      <summary>
        <span class="day-date ${openCls}">${day.short}</span>
        <span class="${rangeCls}">${rangeText}</span>
        <span class="day-badges">
          <span class="badge booked">予${day.booked_count}</span>
          <span class="badge open">全<b>${total}</b></span>
        </span>
      </summary>
      ${dayDetails(day, isToday)}
    </details>`;
  }).join("");
  target.innerHTML = html;
}

function renderLong() {
  const target = document.getElementById("long");
  const days = PAYLOAD.days.slice(7);
  if (!days.length) { target.innerHTML = "<div class='empty' style='color:var(--muted);font-size:13px'>データがありません（日次長期ジョブを起動後に表示）</div>"; return; }
  let rows = "";
  for (const day of days) {
    const range = day.range_text || "—";
    const rangeCls = day.range_text ? "" : "empty";
    const total = day.open_count + day.booked_count;
    rows += `<tr>
      <td>${day.short}</td>
      <td class="${rangeCls}">${range}</td>
      <td class="num">${day.booked_count}／${total}</td>
    </tr>`;
  }
  target.innerHTML = `<table class="long-table">
    <thead><tr><th>日付</th><th>確保時間帯</th><th>予／全</th></tr></thead>
    <tbody>${rows}</tbody></table>`;
}

document.getElementById("updated").textContent = "最終更新: " + fmtJst(PAYLOAD.generated);
renderHero();
renderWeek();
renderLong();
</script>
